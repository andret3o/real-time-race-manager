<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.tailwindcss.com"></script>
		<title>Leaderboard</title>
	</head>
	<body class="flex flex-col items-center justify-center min-h-screen gap-6">
		<button
			onclick="document.documentElement.requestFullscreen()"
			class="bg-black text-white px-6 py-3 rounded-lg absolute top-4 right-4"
		>
			Enter Fullscreen
		</button>

		<div id="session-info" class="flex items-center gap-6">
			<h1 class="text-4xl font-semibold">Leaderboard</h1>
			<p class="text-2xl">|</p>
			<span id="timer-display" class="text-4xl font-medium">10:00</span>
			<p class="text-2xl">|</p>
			<div id="flag-display" class="w-14 h-10 bg-red-500"></div>
		</div>

		<div id="container" class="flex flex-col gap-6 max-w-3xl w-full"></div>
	</body>
	<script src="/socket.io/socket.io.js"></script>
	<script src="/js/leader-board.js"></script>
</html>
